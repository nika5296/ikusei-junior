# 推奨運用: Vercel の「Git 連携」で GitHub の main/master に push すると自動ビルド・本番反映されます。
# そのため本ワークフローは push では起動しません（Actions と Vercel 双方が走る二重デプロイを防ぐ）。
#
# 手元で Actions から出したいときだけ: リポジトリの Actions → 本ワークフロー → Run workflow
# （要 Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID）
#
# 参考: https://vercel.com/kb/guide/how-can-i-use-github-actions-with-vercel
name: Deploy parent-portal to Vercel (manual)

on:
  workflow_dispatch:

concurrency:
  group: vercel-parent-portal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-build: true
          vercel-args: '--prod'
          working-directory: parent-portal
