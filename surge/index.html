<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14532d" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { kg: { forest: '#14532d', leaf: '#15803d', mint: '#ecfdf5', cream: '#fffbeb' } },
            boxShadow: { pop: '0 10px 40px -10px rgba(20, 83, 45, 0.25), 0 4px 12px rgba(20, 83, 45, 0.12)' }
          }
        }
      };
    </script>
    <style>
      details > summary {
        list-style: none;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      @keyframes kg-mascot-float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(1.5deg);
        }
      }
      @keyframes kg-mascot-float-alt {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(-1.5deg);
        }
      }
      .mascot-anim-left {
        animation: kg-mascot-float 2.8s ease-in-out infinite;
      }
      .mascot-anim-right {
        animation: kg-mascot-float-alt 2.8s ease-in-out 0.2s infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .mascot-anim-left,
        .mascot-anim-right {
          animation: none;
        }
      }
      .definition-panel-inner {
        word-break: keep-all;
        line-break: strict;
        overflow-wrap: break-word;
      }
    </style>
    <title>鎌倉グリーン｜振替残数（プレビュー）</title>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-emerald-50 via-white to-amber-50/40 font-sans text-slate-800 antialiased">
    <div class="mx-auto flex min-h-screen max-w-2xl items-start justify-center gap-1 px-1 py-4 pb-8 sm:gap-2 sm:px-3 sm:py-8">
      <!-- 素材2枚目 → 左 -->
      <div class="flex w-14 shrink-0 flex-col items-center sm:w-24 md:w-28">
        <img
          src="./bear-left.png"
          width="112"
          height="160"
          class="mascot-anim-left pointer-events-none h-auto w-full max-w-[7rem] select-none object-contain drop-shadow-lg"
          alt=""
        />
      </div>

      <div class="w-full min-w-0 max-w-md flex-1 space-y-4 px-0.5 sm:px-2">
        <header class="flex items-center gap-3 rounded-2xl border-2 border-emerald-100 bg-white/90 px-3 py-3 shadow-sm backdrop-blur-sm">
          <div
            class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-white p-1.5 shadow-md ring-2 ring-emerald-100"
          >
            <img
              src="./kamakura-green-logo.png"
              width="48"
              height="48"
              class="max-h-[2.25rem] max-w-[2.25rem] object-contain object-center"
              alt=""
            />
          </div>
          <div class="min-w-0">
            <p class="text-sm font-extrabold leading-tight text-emerald-900">鎌倉グリーンテニススクール</p>
            <p class="mt-0.5 text-[11px] font-bold tracking-wide text-emerald-600">育成クラス｜振替残数</p>
          </div>
        </header>

        <section class="overflow-hidden rounded-[1.75rem] border-2 border-emerald-200/80 bg-white shadow-pop">
          <div class="bg-gradient-to-br from-emerald-600 via-emerald-500 to-teal-500 px-5 pb-5 pt-6 text-white">
            <p class="text-xs font-bold uppercase tracking-[0.2em] text-emerald-100/90">おなまえ</p>
            <p class="mt-2 text-3xl font-black leading-tight tracking-tight drop-shadow-sm sm:text-4xl">山田 花子</p>
          </div>

          <div class="w-full px-5 pb-5 pt-5 text-center">
            <p class="text-[11px] font-bold tracking-wide text-slate-500">更新日時</p>
            <p class="mt-0.5 text-sm font-semibold tabular-nums tracking-tight text-slate-600">2026-04-11 8:00</p>
            <p class="mt-6 text-xs font-bold text-emerald-700">振替残数</p>
            <div class="mt-2 flex items-baseline justify-center gap-0.5">
              <span class="text-5xl font-black tabular-nums leading-none text-emerald-600 drop-shadow-sm sm:text-6xl">2</span>
              <span class="pb-0.5 text-lg font-bold leading-none text-emerald-600 sm:text-2xl">回</span>
            </div>
          </div>

          <div class="border-t border-emerald-100 px-4 pb-4 pt-2">
            <details class="group rounded-2xl border-2 border-dashed border-emerald-200 bg-emerald-50/70">
              <summary
                class="flex cursor-pointer list-none items-center justify-between gap-2 rounded-xl px-3 py-2.5 text-sm font-bold text-emerald-900 transition hover:bg-emerald-100/60"
              >
                <span>◆ 振替残数の定義</span>
                <span class="text-lg text-emerald-500 transition-transform duration-200 group-open:rotate-180">▼</span>
              </summary>
              <div
                class="definition-panel-inner border-t border-emerald-100/80 px-3 pb-2.5 pt-1 text-xs font-medium leading-relaxed text-emerald-900/80"
              >
                <p class="mb-1.5 last:mb-0">
                  レギュラーレッスンを欠席or雨天等でレッスンが中止になった場合は<span class="whitespace-nowrap">振替</span>がたまります。
                </p>
                <p class="mb-1.5 last:mb-0">
                  <span class="whitespace-nowrap">振替予約</span>した日に出席した時点で残数が<span class="whitespace-nowrap">1つ</span>減ります。
                </p>
                <p class="mb-0">→予約しただけでは減りません。</p>
              </div>
            </details>
          </div>

          <div class="space-y-3 border-t border-emerald-100 px-5 pb-5 pt-4">
            <a
              href="https://reserva.be/kamakuragreen"
              class="block w-full rounded-full bg-gradient-to-r from-amber-400 via-amber-300 to-yellow-300 py-3.5 text-center text-base font-black text-amber-950 shadow-lg ring-2 ring-amber-200/80 transition hover:scale-[1.02] hover:brightness-105 active:scale-[0.98]"
            >
              🎾 振替予約はこちら
            </a>
            <p class="text-center text-[10px] text-slate-400">このURLは家族内のみでご利用ください</p>
          </div>
        </section>

        <p class="text-center text-[10px] font-medium text-emerald-600/60">Kamakura Green Tennis School</p>
      </div>

      <!-- 素材3枚目 → 右 -->
      <div class="flex w-14 shrink-0 flex-col items-center sm:w-24 md:w-28">
        <img
          src="./bear-right.png"
          width="112"
          height="160"
          class="mascot-anim-right pointer-events-none h-auto w-full max-w-[7rem] select-none object-contain drop-shadow-lg"
          alt=""
        />
      </div>
    </div>
  </body>
</html>
